<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GasBerth Scheduler Mockup</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --ink: #1f2a37;
      --muted: #667085;
      --line: #d9e1e8;
      --brand: #0d7f74;
      --brand-dark: #075e56;
      --accent: #d61f2c;
      --blue: #1f6feb;
      --amber: #f59e0b;
      --green: #16a34a;
      --soft: #e8f4f2;
      --shadow: 0 18px 45px rgba(31, 42, 55, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      background: #143c45;
      color: #e7fbf8;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 8px 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,.14);
    }

    .mark {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0d7f74, #d61f2c);
      color: #fff;
      font-weight: 700;
    }

    .brand strong {
      display: block;
      font-size: 15px;
      letter-spacing: .2px;
    }

    .brand span {
      display: block;
      color: #b8d6d2;
      font-size: 12px;
      margin-top: 2px;
    }

    .nav-group-title {
      color: #9fc5c0;
      font-size: 12px;
      margin: 8px 10px 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .nav-link {
      width: 100%;
      border: 0;
      background: transparent;
      color: #e7fbf8;
      text-align: left;
      padding: 10px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 14px;
    }

    .nav-link:hover, .nav-link.active {
      background: rgba(255,255,255,.12);
    }

    .nav-link .dot {
      width: 7px;
      height: 7px;
      border-radius: 99px;
      background: #4fd1c5;
      flex: 0 0 auto;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 64px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .topbar p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill, .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      padding: 8px 11px;
      font-size: 13px;
      color: var(--ink);
    }

    .btn {
      cursor: pointer;
      display: inline-flex;
      gap: 7px;
      align-items: center;
      text-decoration: none;
    }

    .btn.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .btn.danger {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .content {
      padding: 22px 24px 32px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(31,42,55,.04);
    }

    .metric {
      padding: 16px;
      display: grid;
      gap: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric strong {
      font-size: 27px;
    }

    .metric small {
      color: var(--green);
      font-size: 12px;
    }

    .section-head {
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .section-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #344054;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      background: #eef6ff;
      color: var(--blue);
    }

    .status.green {
      background: #ecfdf3;
      color: var(--green);
    }

    .status.amber {
      background: #fffbeb;
      color: #b45309;
    }

    .status.red {
      background: #fff1f3;
      color: var(--accent);
    }

    .calendar {
      padding: 16px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(96px, 1fr));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .day-name, .day-cell {
      min-height: 94px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
    }

    .day-name {
      min-height: auto;
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .day-name:nth-child(7n), .day-cell:nth-child(7n) {
      border-right: 0;
    }

    .day-cell:nth-last-child(-n+7) {
      border-bottom: 0;
    }

    .date {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .event {
      display: block;
      padding: 5px 6px;
      border-radius: 5px;
      background: var(--soft);
      color: var(--brand-dark);
      font-size: 11px;
      margin-top: 5px;
      line-height: 1.25;
    }

    .event.alt {
      background: #fff1f3;
      color: #b42318;
    }

    .event.blue {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #344054;
      font-size: 13px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font-weight: 400;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .tv-screen {
      min-height: 100vh;
      background: #082f37;
      color: #fff;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .tv-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      border-bottom: 1px solid rgba(255,255,255,.18);
      padding-bottom: 18px;
    }

    .tv-header h1 {
      margin: 0;
      font-size: 34px;
    }

    .tv-header span {
      color: #9fe3da;
      display: block;
      margin-top: 6px;
    }

    .tv-clock {
      text-align: right;
      font-size: 18px;
      color: #d9fffb;
    }

    .tv-grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 22px;
      flex: 1;
    }

    .tv-card {
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 20px;
    }

    .tv-card h2 {
      margin: 0 0 18px;
      font-size: 23px;
      color: #fff;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 120px minmax(0,1fr) 132px;
      gap: 12px;
      align-items: center;
      padding: 13px;
      border-radius: 8px;
      background: rgba(255,255,255,.1);
    }

    .timeline-row strong {
      font-size: 18px;
    }

    .timeline-row small {
      color: #b8d6d2;
      display: block;
      margin-top: 3px;
    }

    .print-page {
      max-width: 1120px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 28px;
      min-height: 720px;
    }

    .print-title {
      text-align: center;
      border-bottom: 2px solid #1f2a37;
      padding-bottom: 14px;
      margin-bottom: 18px;
    }

    .print-title h1 {
      margin: 0;
      font-size: 22px;
      text-transform: uppercase;
    }

    .print-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .login-layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, .9fr) minmax(420px, 1.1fr);
      background: #0e3b44;
    }

    .login-hero {
      padding: 54px;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        linear-gradient(150deg, rgba(13,127,116,.95), rgba(20,60,69,.82)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.12) 0 1px, transparent 1px 22px);
    }

    .login-hero h1 {
      font-size: 40px;
      margin: 28px 0 12px;
    }

    .login-hero p {
      max-width: 520px;
      color: #d9fffb;
      line-height: 1.6;
    }

    .login-panel {
      background: #f8fafc;
      display: grid;
      place-items: center;
      padding: 34px;
    }

    .login-card {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .login-card h2 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .login-card p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .login-card form {
      display: grid;
      gap: 14px;
    }

    .login-card .btn {
      justify-content: center;
      margin-top: 6px;
      padding: 11px;
    }

    .empty-note {
      margin: 18px 0 0;
      padding: 18px;
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed var(--line);
      border-radius: 8px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1000px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .metrics, .form-grid, .tv-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        grid-template-columns: repeat(2, minmax(130px, 1fr));
      }
    }

    @media print {
      body {
        background: #fff;
      }
      .sidebar, .topbar, .content > .section-head:first-child {
        display: none;
      }
      .app-shell {
        display: block;
      }
      .content {
        padding: 0;
      }
      .print-page {
        box-shadow: none;
        border: 0;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const vesselRows = {
      LPG: [
        ['LPG/C Gas Widuri', 'Tanjung Uban', 'PAG Arun', '16 Jul 2026 08:00', '18 Jul 2026 19:00', 'Loading', 'On Berth'],
        ['LPG/C Gas Ambalat', 'Balongan', 'PAG Arun', '20 Jul 2026 06:30', '22 Jul 2026 15:30', 'Discharge', 'Planned'],
        ['LPG/C Gas Komodo', 'PAG Arun', 'Teluk Semangka', '24 Jul 2026 10:00', '26 Jul 2026 21:00', 'Loading', 'Waiting'],
      ],
      LNG: [
        ['LNG/C Tangguh Foja', 'Bontang', 'PAG Arun', '17 Jul 2026 09:00', '19 Jul 2026 20:00', 'Cooldown', 'On Berth'],
        ['LNG/C Arun Spirit', 'PAG Arun', 'Incheon', '21 Jul 2026 11:00', '23 Jul 2026 23:00', 'Loading', 'Planned'],
        ['LNG/C Aquarius', 'Qalhat LNG', 'PAG Arun', '25 Jul 2026 07:30', '27 Jul 2026 18:00', 'Discharge', 'Waiting'],
      ],
    };

    const masterData = {
      loading: ['PAG Arun', 'Balongan', 'Tanjung Uban', 'Bontang', 'Qalhat LNG'],
      discharge: ['PAG Arun', 'Teluk Semangka', 'Incheon', 'Singapore Terminal', 'Tanjung Priok'],
      vessel: ['LPG/C Gas Widuri', 'LPG/C Gas Ambalat', 'LNG/C Tangguh Foja', 'LNG/C Arun Spirit'],
      owner: ['PT Pertamina International Shipping', 'MISC Berhad', 'NYK Line', 'MOL LNG Transport'],
      berth: ['Jetty 1 LNG', 'Jetty 2 LPG', 'Marine Loading Arm A', 'Marine Loading Arm B'],
      activity: ['Loading', 'Discharge', 'Cooldown', 'Gassing Up', 'Standby'],
      status: ['Planned', 'Waiting', 'On Berth', 'Completed', 'Delayed'],
    };

    const figures = [
      ['login', 'Gambar 1. Halaman Login GasBerth Scheduler'],
      ['calendar-lpg', 'Gambar 2. Halaman Dashboard Kalender Jadwal Kapal LPG'],
      ['print-calendar-lpg', 'Gambar 3. Halaman Cetak Data Kalender LPG'],
      ['tv-lpg', 'Gambar 4. Tampilan Halaman TV LPG'],
      ['print-tv-lpg', 'Gambar 5. Halaman Cetak Data TV LPG'],
      ['dashboard-lpg', 'Gambar 6. Halaman Dashboard GasBerth Scheduler LPG'],
      ['schedule-lpg', 'Gambar 7. Halaman Data Jadwal Kapal LPG'],
      ['add-lpg', 'Gambar 8. Halaman Tambah Data LPG'],
      ['master-lpg-loading', 'Gambar 9. Halaman Daftar Loading Port'],
      ['master-lpg-discharge', 'Gambar 10. Halaman Daftar Discharge Port'],
      ['master-lpg-vessel', 'Gambar 11. Halaman Daftar Vessel'],
      ['master-lpg-activity', 'Gambar 12. Halaman Daftar Activity'],
      ['calendar-lng', 'Gambar 13. Halaman Dashboard Kalender Jadwal Kapal LNG'],
      ['print-calendar-lng', 'Gambar 14. Halaman Cetak Data Kalender LNG'],
      ['tv-lng', 'Gambar 15. Tampilan Halaman TV LNG'],
      ['print-tv-lng', 'Gambar 16. Halaman Cetak Data TV LNG'],
      ['dashboard-lng', 'Gambar 17. Dashboard GasBerth Scheduler LNG'],
      ['schedule-lng', 'Gambar 18. Halaman Data Jadwal Kapal LNG'],
      ['add-lng', 'Gambar 19. Halaman Tambah Data LNG'],
      ['master-lng-loading', 'Gambar 20. Halaman Daftar Loading Port'],
      ['master-lng-discharge', 'Gambar 21. Halaman Daftar Discharge Port'],
      ['master-lng-vessel', 'Gambar 22. Halaman Daftar Vessel'],
      ['master-lng-owner', 'Gambar 23. Halaman Daftar Owner'],
      ['master-lng-berth', 'Gambar 24. Halaman Daftar Berth'],
      ['master-lng-activity', 'Gambar 25. Halaman Daftar Activity'],
      ['master-lng-status', 'Gambar 26. Halaman Daftar Status'],
      ['users-before', 'Gambar 27. User Sebelum Penambahan Data Superadmin'],
      ['users-after', 'Gambar 28. User Setelah Penambahan Data Superadmin'],
      ['view-only', 'Tambahan. Halaman View Only'],
    ];

    function activeRoute() {
      return (location.hash || '#login').slice(1);
    }

    function setRoute(route) {
      location.hash = route;
    }

    function statusClass(status) {
      if (status === 'On Berth' || status === 'Completed' || status === 'Aktif') return 'green';
      if (status === 'Waiting' || status === 'Delayed') return 'amber';
      if (status === 'Nonaktif') return 'red';
      return '';
    }

    function layout(title, subtitle, body, actions = '') {
      const route = activeRoute();
      return `
        <div class="app-shell">
          <aside class="sidebar">
            <div class="brand">
              <div class="mark">GB</div>
              <div><strong>GasBerth Scheduler</strong><span>PT Perta Arun Gas</span></div>
            </div>
            <div class="nav-group-title">Screenshot</div>
            ${figures.map(([key, label]) => `
              <button class="nav-link ${route === key ? 'active' : ''}" onclick="setRoute('${key}')">
                <span class="dot"></span><span>${label.replace(/^Gambar \\d+\\.\\s*/, '').replace(/^Tambahan\\.\\s*/, '')}</span>
              </button>
            `).join('')}
          </aside>
          <main class="main">
            <header class="topbar">
              <div><h1>${title}</h1><p>${subtitle}</p></div>
              <div class="top-actions">
                <span class="pill">User: Superadmin</span>
                <span class="pill">15 Juli 2026</span>
                ${actions}
              </div>
            </header>
            <section class="content">${body}</section>
          </main>
        </div>
      `;
    }

    function loginScreen() {
      return `
        <div class="login-layout">
          <section class="login-hero">
            <div>
              <div class="brand" style="border:0;padding:0">
                <div class="mark">GB</div>
                <div><strong>GasBerth Scheduler</strong><span>Terminal LNG & LPG</span></div>
              </div>
              <h1>Kelola jadwal kapal secara real-time</h1>
              <p>Aplikasi web untuk memantau kedatangan, keberangkatan, proses sandar, loading, discharge, dan data pendukung operasional terminal.</p>
            </div>
            <p>PT Perta Arun Gas - Integrated Marine Operation</p>
          </section>
          <section class="login-panel">
            <div class="login-card">
              <h2>Masuk Aplikasi</h2>
              <p>Gunakan username dan password yang diberikan administrator.</p>
              <form>
                <label>Username<input value="superadmin" /></label>
                <label>Password<input type="password" value="gasberth2026" /></label>
                <button type="button" class="btn primary" onclick="setRoute('dashboard-lpg')">Login</button>
              </form>
            </div>
          </section>
        </div>
      `;
    }

    function dashboard(type) {
      const rows = vesselRows[type];
      const body = `
        <div class="grid metrics">
          <div class="card metric"><span>Total Jadwal ${type}</span><strong>${type === 'LPG' ? 24 : 18}</strong><small>+3 jadwal minggu ini</small></div>
          <div class="card metric"><span>Kapal On Berth</span><strong>2</strong><small>Operasional berjalan</small></div>
          <div class="card metric"><span>Loading</span><strong>${type === 'LPG' ? 8 : 6}</strong><small>Dalam periode Juli</small></div>
          <div class="card metric"><span>Discharge</span><strong>${type === 'LPG' ? 10 : 7}</strong><small>Dalam periode Juli</small></div>
        </div>
        <div class="card" style="margin-top:16px">
          <div class="section-head">
            <div><h2>Jadwal Operasional Terdekat</h2><p>Ringkasan kapal ${type} yang sedang berlangsung dan terencana.</p></div>
            <button class="btn primary" onclick="setRoute('add-${type.toLowerCase()}')">+ Tambah Data</button>
          </div>
          ${scheduleTable(rows)}
        </div>
      `;
      return layout(`Dashboard GasBerth Scheduler ${type}`, `Ringkasan operasional kapal ${type}`, body);
    }

    function calendarMarkup(type) {
      const events = type === 'LPG'
        ? [['16','Gas Widuri','Loading'], ['18','Gas Widuri','Departure'], ['20','Gas Ambalat','Arrival'], ['24','Gas Komodo','Loading']]
        : [['17','Tangguh Foja','Cooldown'], ['19','Tangguh Foja','Departure'], ['21','Arun Spirit','Loading'], ['25','Aquarius','Discharge']];
      const cells = Array.from({length: 35}, (_, i) => i + 1).map(day => {
        const dayEvents = events.filter(e => Number(e[0]) === day);
        return `<div class="day-cell"><div class="date">${day} Jul</div>${dayEvents.map((e, idx) => `<span class="event ${idx % 2 ? 'alt' : 'blue'}">${e[1]}<br>${e[2]}</span>`).join('')}</div>`;
      }).join('');
      return `
        <div class="calendar">
          <div class="calendar-grid">
            ${['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(d => `<div class="day-name">${d}</div>`).join('')}
            ${cells}
          </div>
        </div>
      `;
    }

    function calendar(type) {
      const body = `
        <div class="card">
          <div class="section-head">
            <div><h2>Kalender Jadwal Kapal ${type}</h2><p>Tampilan bulanan untuk memantau kedatangan, keberangkatan, dan penggunaan dermaga.</p></div>
            <div class="top-actions"><button class="btn" onclick="setRoute('print-calendar-${type.toLowerCase()}')">Cetak Kalender</button><button class="btn primary" onclick="setRoute('add-${type.toLowerCase()}')">+ Tambah</button></div>
          </div>
          ${calendarMarkup(type)}
        </div>
      `;
      return layout(`Dashboard Kalender Jadwal Kapal ${type}`, `Periode Juli 2026`, body);
    }

    function scheduleTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Vessel</th><th>Loading Port</th><th>Discharge Port</th><th>ETA</th><th>ETD</th><th>Activity</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody>
              ${rows.map(row => `<tr>${row.map((cell, idx) => idx === 6 ? `<td><span class="status ${statusClass(cell)}">${cell}</span></td>` : `<td>${cell}</td>`).join('')}<td><button class="btn">Edit</button></td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function schedule(type) {
      const body = `
        <div class="card">
          <div class="section-head">
            <div><h2>Data Jadwal Kapal ${type}</h2><p>Kelola jadwal kedatangan, keberangkatan, aktivitas, dan status kapal.</p></div>
            <div class="top-actions"><input style="width:220px" value="Cari kapal..." /><button class="btn primary" onclick="setRoute('add-${type.toLowerCase()}')">+ Tambah Data</button></div>
          </div>
          ${scheduleTable(vesselRows[type])}
        </div>
      `;
      return layout(`Data Jadwal Kapal ${type}`, `Manajemen jadwal operasional ${type}`, body);
    }

    function addForm(type) {
      const body = `
        <div class="card">
          <div class="section-head"><div><h2>Tambah Data ${type}</h2><p>Input jadwal operasional kapal baru.</p></div></div>
          <div class="form-grid">
            <label>Vessel<select><option>${vesselRows[type][0][0]}</option><option>${vesselRows[type][1][0]}</option></select></label>
            <label>Activity<select><option>Loading</option><option>Discharge</option><option>Cooldown</option></select></label>
            <label>Loading Port<select><option>PAG Arun</option><option>Bontang</option><option>Balongan</option></select></label>
            <label>Discharge Port<select><option>PAG Arun</option><option>Incheon</option><option>Teluk Semangka</option></select></label>
            <label>ETA<input type="datetime-local" value="2026-07-16T08:00" /></label>
            <label>ETD<input type="datetime-local" value="2026-07-18T19:00" /></label>
            ${type === 'LNG' ? '<label>Owner<select><option>PT Pertamina International Shipping</option><option>MISC Berhad</option></select></label><label>Berth<select><option>Jetty 1 LNG</option><option>Marine Loading Arm A</option></select></label>' : ''}
            <label>Status<select><option>Planned</option><option>Waiting</option><option>On Berth</option></select></label>
            <label>Nomor Voyage<input value="${type}-0726-01" /></label>
            <label class="wide">Catatan Operasional<textarea>Koordinasi dengan marine operation dan terminal control room.</textarea></label>
          </div>
          <div class="section-head"><span></span><div class="top-actions"><button class="btn">Batal</button><button class="btn primary">Simpan Data</button></div></div>
        </div>
      `;
      return layout(`Tambah Data ${type}`, `Form penambahan jadwal kapal ${type}`, body);
    }

    function master(type, key) {
      const title = key.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      const rows = (masterData[key] || []).map((name, idx) => [String(idx + 1).padStart(2, '0'), name, idx % 2 ? 'Nonaktif' : 'Aktif']);
      const body = `
        <div class="card">
          <div class="section-head">
            <div><h2>Daftar ${title}</h2><p>Master data referensi untuk penjadwalan kapal ${type}.</p></div>
            <div class="top-actions"><input style="width:220px" value="Cari data..." /><button class="btn primary">+ Tambah Data</button></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Kode</th><th>Nama ${title}</th><th>Status</th><th>Diperbarui</th><th>Aksi</th></tr></thead>
              <tbody>${rows.map(row => `<tr><td>${row[0]}</td><td>${row[1]}</td><td><span class="status ${statusClass(row[2])}">${row[2]}</span></td><td>15 Jul 2026</td><td><button class="btn">Edit</button></td></tr>`).join('')}</tbody>
            </table>
          </div>
        </div>
      `;
      return layout(`Master Data ${title} ${type}`, `Pengelolaan data ${title}`, body);
    }

    function tv(type) {
      const rows = vesselRows[type];
      return `
        <div class="tv-screen">
          <div class="tv-header">
            <div><h1>GasBerth Scheduler ${type}</h1><span>Live Marine Operation Display - Terminal Control Room</span></div>
            <div class="tv-clock"><strong>15 Juli 2026</strong><br>08:45 WIB</div>
          </div>
          <div class="tv-grid">
            <section class="tv-card">
              <h2>Jadwal Kapal Hari Ini</h2>
              <div class="timeline">
                ${rows.map(row => `<div class="timeline-row"><div><strong>${row[3].slice(12)}</strong><small>ETA</small></div><div><strong>${row[0]}</strong><small>${row[1]} ke ${row[2]}</small></div><span class="status ${statusClass(row[6])}">${row[6]}</span></div>`).join('')}
              </div>
            </section>
            <section class="tv-card">
              <h2>Status Dermaga</h2>
              <div class="timeline">
                <div class="timeline-row" style="grid-template-columns:1fr 120px"><div><strong>Jetty 1</strong><small>Marine Loading Arm A</small></div><span class="status green">Occupied</span></div>
                <div class="timeline-row" style="grid-template-columns:1fr 120px"><div><strong>Jetty 2</strong><small>Persiapan sandar</small></div><span class="status amber">Standby</span></div>
                <div class="timeline-row" style="grid-template-columns:1fr 120px"><div><strong>Weather</strong><small>Wind 8 knot, visibility good</small></div><span class="status green">Normal</span></div>
              </div>
            </section>
          </div>
        </div>
      `;
    }

    function printPage(type, mode) {
      const title = mode === 'calendar' ? `Cetak Data Kalender ${type}` : `Cetak Data TV ${type}`;
      const body = `
        <div class="print-page">
          <div class="print-title"><h1>${title}</h1><p>PT Perta Arun Gas - Periode Juli 2026</p></div>
          ${mode === 'calendar' ? calendarMarkup(type) : scheduleTable(vesselRows[type])}
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:36px;text-align:center;color:var(--muted);font-size:13px">
            <div>Disiapkan oleh,<br><br><br><strong>Marine Operation</strong></div>
            <div>Disetujui oleh,<br><br><br><strong>Terminal Manager</strong></div>
          </div>
        </div>
      `;
      return layout(title, `Pratinjau dokumen cetak ${type}`, body, '<button class="btn primary" onclick="window.print()">Print</button>');
    }

    function users(after) {
      const rows = [
        ['USR001', 'Operator LPG', 'operator.lpg', 'LPG Only', 'Aktif'],
        ['USR002', 'Operator LNG', 'operator.lng', 'LNG Only', 'Aktif'],
        ['USR003', 'Viewer Operasional', 'viewer.ops', 'View Only', 'Aktif'],
      ];
      if (after) rows.push(['USR004', 'Superadmin', 'superadmin', 'Superadmin', 'Aktif']);
      const body = `
        <div class="card">
          <div class="section-head">
            <div><h2>${after ? 'User Setelah Penambahan Data Superadmin' : 'User Sebelum Penambahan Data Superadmin'}</h2><p>Pengelolaan akun dan hak akses aplikasi.</p></div>
            <button class="btn primary">+ Tambah User</button>
          </div>
          <div class="table-wrap">
            <table><thead><tr><th>ID</th><th>Nama</th><th>Username</th><th>Role</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td><span class="status green">${r[4]}</span></td><td><button class="btn">Edit</button></td></tr>`).join('')}</tbody></table>
          </div>
        </div>
      `;
      return layout(after ? 'Halaman Setelah Penambahan Superadmin' : 'Halaman Sebelum Penambahan Superadmin', 'Manajemen pengguna GasBerth Scheduler', body);
    }

    function viewOnly() {
      const body = `
        <div class="card">
          <div class="section-head">
            <div><h2>Dashboard View Only</h2><p>Pengguna hanya dapat melihat dan mencari informasi tanpa menambah, mengubah, atau menghapus data.</p></div>
            <span class="pill">Mode Baca Saja</span>
          </div>
          ${scheduleTable(vesselRows.LNG)}
          <div class="empty-note">Tombol tambah, edit, dan hapus disembunyikan untuk menjaga keamanan dan konsistensi data operasional.</div>
        </div>
      `;
      return layout('Halaman View Only', 'Hak akses terbatas untuk pemantauan data', body);
    }

    function render() {
      const route = activeRoute();
      const routes = {
        login: loginScreen,
        'calendar-lpg': () => calendar('LPG'),
        'print-calendar-lpg': () => printPage('LPG', 'calendar'),
        'tv-lpg': () => tv('LPG'),
        'print-tv-lpg': () => printPage('LPG', 'tv'),
        'dashboard-lpg': () => dashboard('LPG'),
        'schedule-lpg': () => schedule('LPG'),
        'add-lpg': () => addForm('LPG'),
        'master-lpg-loading': () => master('LPG', 'loading'),
        'master-lpg-discharge': () => master('LPG', 'discharge'),
        'master-lpg-vessel': () => master('LPG', 'vessel'),
        'master-lpg-activity': () => master('LPG', 'activity'),
        'calendar-lng': () => calendar('LNG'),
        'print-calendar-lng': () => printPage('LNG', 'calendar'),
        'tv-lng': () => tv('LNG'),
        'print-tv-lng': () => printPage('LNG', 'tv'),
        'dashboard-lng': () => dashboard('LNG'),
        'schedule-lng': () => schedule('LNG'),
        'add-lng': () => addForm('LNG'),
        'master-lng-loading': () => master('LNG', 'loading'),
        'master-lng-discharge': () => master('LNG', 'discharge'),
        'master-lng-vessel': () => master('LNG', 'vessel'),
        'master-lng-owner': () => master('LNG', 'owner'),
        'master-lng-berth': () => master('LNG', 'berth'),
        'master-lng-activity': () => master('LNG', 'activity'),
        'master-lng-status': () => master('LNG', 'status'),
        'users-before': () => users(false),
        'users-after': () => users(true),
        'view-only': viewOnly,
      };
      document.getElementById('app').innerHTML = (routes[route] || loginScreen)();
    }

    window.addEventListener('hashchange', render);
    render();
  </script>
</body>
</html>
